<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edifica · Central</title>

    <!-- Inter Variable (eixo wght 100..900) - fonte base do design system Linear -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!--
      Pré-aplica o feature-settings da Inter (cv01 + ss03) no <html> antes do
      JS carregar. Sem isso, há um flash de Inter sem stylistic alternates
      durante o boot do app.
    -->
    <style>
      html {
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-feature-settings: "cv01", "ss03";
        font-variation-settings: "wght" 400;
        background: #08090a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
